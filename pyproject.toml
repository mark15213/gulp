# uv workspace root (virtual — not itself a package).
# Members are the Python services; they share this lockfile (uv.lock).
[tool.uv.workspace]
members = ["services/api", "services/worker", "services/shared"]

# Repo-wide dev tooling, installed into the workspace env by `uv sync`.
[dependency-groups]
dev = [
    "ruff>=0.8",
    "mypy>=1.13",
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection idiom: Depends()/Query() in defaults is by design.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.File"]

[tool.ruff.lint.per-file-ignores]
# Alembic migrations favor literal fidelity over line-width.
"services/api/alembic/versions/*" = ["E501"]

[tool.mypy]
python_version = "3.13"
strict = true
# api and worker both expose a top-level `app` package, and every service has a
# tests/conftest.py — mypy must run per service (see justfile), like pytest.
# Tests and alembic scripts are excluded: tests are exercised by pytest and use
# fixtures/dynamic patterns that fight strict typing; migrations are operational.
exclude = ['alembic/', '/tests/']

[[tool.mypy.overrides]]
# PyMuPDF ships py.typed under the `pymupdf` dist, but not under the `fitz`
# compat-alias import name that its own docs recommend using.
module = "fitz"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# feedparser ships no type stubs.
module = "feedparser.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"

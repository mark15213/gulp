# Production stack — single host. Run via infra/deploy.sh.
# Only caddy publishes ports; everything else is internal-only.
name: gulp

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    logging: *logging

  web:
    image: gulp-web:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    logging: *logging

  api:
    image: gulp-python:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile.python
    restart: unless-stopped
    working_dir: /app
    command: ["uv", "run", "--no-sync", "--package", "gulp-api", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    volumes:
      - media:/data/media
      - exports:/data/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging

  worker:
    image: gulp-python:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile.python
    restart: unless-stopped
    working_dir: /app/services/worker
    command: ["uv", "run", "--no-sync", "--package", "gulp-worker", "python", "-m", "app.tasks"]
    env_file: .env
    volumes:
      - media:/data/media
      - exports:/data/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *logging
    # Singleton — never `--scale worker=N`.

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: gulp
      POSTGRES_DB: gulp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gulp -d gulp"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging

  rsshub:
    image: diygod/rsshub:2025-10-20
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    logging: *logging

volumes:
  pgdata:
  media:
  exports:
  redis-data:
  caddy-data:
  caddy-config:

# Local dev infra. `just up` / `just down`.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: gulp
      POSTGRES_PASSWORD: gulp
      POSTGRES_DB: gulp
    ports:
      - "5432:5432"
    volumes:
      - gulp_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Self-hosted RSSHub (spec 2026-07-09 §6) — resolves rsshub:// feed addresses.
  # Pinned to the last gzip-layered tag: newer tags use zstd layers, which the
  # locally installed Docker 20.10 cannot extract ("invalid tar header").
  # After upgrading Docker Desktop (>= 23), feel free to move to `latest`.
  rsshub:
    image: diygod/rsshub:2025-10-20
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/1
      # Route upstream fetches through the host's local proxy so routes for
      # sites unreachable from a bare domestic connection (anthropic, openai,
      # bsky, …) work; the proxy's own rules keep domestic sites direct.
      PROXY_URI: http://host.docker.internal:7993
    depends_on:
      - redis

volumes:
  gulp_pgdata:

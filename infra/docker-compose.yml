# Local dev infra. `just up` / `just down`.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: gulp
      POSTGRES_PASSWORD: gulp
      POSTGRES_DB: gulp
    ports:
      - "5432:5432"
    volumes:
      - gulp_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  gulp_pgdata:
